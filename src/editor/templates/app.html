<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="page.title">Álbum PDF - {{ album_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/editor.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--color-border);
            background: var(--color-bg-secondary);
        }
        
        .tab-button {
            flex: 0 1 auto;
            padding: 12px 24px;
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all var(--transition-fast);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tab-button:hover {
            color: var(--color-text-primary);
        }
        
        .tab-button.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }
        
        /* Tab Content Containers */
        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
        }
        
        .tab-content.active {
            display: flex;
        }
        
        /* Extend header to include tabs */
        .header-tabs {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        
        .tabs-left {
            flex: 1;
            display: flex;
            gap: 0;
        }

        /* Sidebar sections with visual separation */
        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid var(--color-border);
        }

        .sidebar-section.sidebar-page-info,
        .sidebar-section.sidebar-event-info {
            background: var(--color-bg-secondary);
        }

        .sidebar-section.sidebar-photos {
            background: var(--color-bg);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-section h3 {
            margin: 0 0 12px 0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-text-secondary);
        }

        .info-box {
            background: var(--color-bg);
            padding: 12px;
            border-radius: var(--border-radius-sm);
            font-size: 12px;
            line-height: 1.6;
        }

        .info-box p {
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header with Tabs -->
        <header class="header">
            <div class="header-tabs">
                <div class="tabs-left">
                    <button class="tab-button" id="tab-source" onclick="switchTab('source')" data-i18n="header.source">
                        📸 Fuente
                    </button>
                    <button class="tab-button active" id="tab-album" onclick="switchTab('album')" data-i18n="header.edition">
                        📖 Edición
                    </button>
                </div>
                
                <div class="header-center">
                    <h1 id="header-title">{{ album_title }}</h1>
                    <span class="page-indicator">
                        <span data-i18n="header.page_indicator">Página</span> <span id="current-page-num">1</span> / <span id="total-pages">{{ total_pages }}</span>
                    </span>
                </div>
                
                <div class="header-right">
                    <button id="open-folder-btn" class="btn btn-secondary" onclick="openAnotherFolder()" data-i18n="header.open_folder">📁 Abrir carpeta</button>
                    <button id="lang-btn" onclick="toggleLanguage()" title="Toggle language" style="padding: 8px 12px; background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: var(--border-radius-sm); cursor: pointer; font-weight: 600;">ES</button>
                    <button id="debug-btn" class="btn btn-secondary" data-i18n-title="header.debug">{ }</button>
                    <button id="undo-btn" class="btn btn-secondary" disabled data-i18n="header.undo">↶ Deshacer</button>
                    <button id="save-btn" class="btn btn-primary" data-i18n="header.save">💾 Guardar</button>
                    <button id="exit-btn" class="btn btn-secondary" data-i18n="header.exit">✕ Salir</button>
                    <label class="theme-switch" data-i18n-title="header.dark_mode" title="Modo oscuro">
                        <input type="checkbox" id="theme-toggle">
                        <span class="theme-slider"></span>
                    </label>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <div class="main-content">
            
            <!-- ═══════════════════════════════════════════════════════════════════════════
                 TAB 1: SOURCE PHOTOS MODE
                 ═══════════════════════════════════════════════════════════════════════════ -->
            <div class="tab-content" id="tab-source-content">
                
                <!-- Event Folders Navigator (left edge) -->
                <div id="event-panel" class="page-panel collapsed">
                    <div class="page-panel-topbar">
                        <button id="event-panel-toggle" class="page-panel-toggle-btn" data-i18n-title="source.navigator_title" title="Navegador de carpetas de evento">
                            <span class="hamburger-icon">
                                <span></span>
                                <span></span>
                                <span></span>
                            </span>
                        </button>
                        <span class="page-panel-label" data-i18n="source.navigator_label">Eventos</span>
                    </div>
                    <div class="page-panel-inner">
                        <div id="event-list" class="page-list"></div>
                    </div>
                </div>

                <!-- Sidebar for Source Mode -->
                <aside class="sidebar">
                    <!-- Info Section -->
                    <div class="sidebar-section sidebar-event-info">
                        <h3 data-i18n="source.section_info">Info</h3>
                        <div class="info-box">
                            <p><strong data-i18n="source.info_event">Evento:</strong> <span id="source-event-name">-</span></p>
                            <p><strong data-i18n="source.info_photos">Fotos:</strong> <span id="source-photo-count">0</span></p>
                        </div>
                    </div>

                    <!-- Event Name Section -->
                    <div class="sidebar-section sidebar-event-info">
                        <h3 data-i18n="source.event_name">Nombre de Evento</h3>
                        <input 
                            type="text" 
                            id="event-name-input" 
                            class="form-input" 
                            data-i18n-placeholder="source.event_name_placeholder"
                            placeholder="Nombre del evento"
                        />
                        <button id="rename-event-btn" class="btn btn-secondary btn-block" data-i18n="source.rename_event">
                            ✏️ Renombrar Evento
                        </button>
                    </div>

                    <!-- Actions Section -->
                    <div class="sidebar-section sidebar-event-info">
                        <h3 data-i18n="source.section_actions">Acciones</h3>
                        <button id="regenerate-album-btn" class="btn btn-primary btn-block" data-i18n="source.regenerate_album">
                            🔄 Regenerar Álbum
                        </button>
                        <button id="delete-event-btn" class="btn btn-danger btn-block" data-i18n="source.delete_event">
                            🗑️ Borrar Evento Completo
                        </button>
                    </div>

                    <!-- Photos Section -->
                    <div class="sidebar-section sidebar-photos">
                        <h3 data-i18n="source.section_photos">Fotos del Evento</h3>
                        <div id="source-photo-list" class="photo-list">
                            <!-- Source photos will be loaded here -->
                        </div>
                    </div>

                    <!-- Delete Photo Button -->
                    <div class="sidebar-section sidebar-photos" style="border-top: 1px solid var(--color-border); padding: 12px; flex-grow: 0;">
                        <button id="delete-source-photo-btn" class="btn btn-danger btn-block" disabled data-i18n="source.delete_photo">
                            🗑️ Borrar Foto
                        </button>
                    </div>
                </aside>

                <!-- Image Viewer -->
                <main class="preview-area">
                    <div class="preview-container" style="display: flex; align-items: center; justify-content: center; background: var(--color-bg-secondary);">
                        <img 
                            id="source-image-viewer" 
                            src="" 
                            data-i18n-title="image.source_preview"
                            alt="Vista previa de foto"
                            style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: var(--border-radius-md); box-shadow: var(--shadow-md);"
                        />
                    </div>
                </main>
            </div>

            <!-- ═══════════════════════════════════════════════════════════════════════════
                 TAB 2: ALBUM EDITION MODE
                 ═══════════════════════════════════════════════════════════════════════════ -->
            <div class="tab-content active" id="tab-album-content">
                
                <!-- Page Navigator Panel (collapsible, left edge) -->
                <div id="page-panel" class="page-panel collapsed">
                    <div class="page-panel-topbar">
                        <button id="page-panel-toggle" class="page-panel-toggle-btn" data-i18n-title="album.navigator_title" title="Navegador de páginas">
                            <span class="hamburger-icon">
                                <span></span>
                                <span></span>
                                <span></span>
                            </span>
                        </button>
                        <span class="page-panel-label" data-i18n="album.navigator_label">Páginas</span>
                    </div>
                    <div class="page-panel-inner">
                        <div id="page-list" class="page-list"></div>
                    </div>
                </div>

                <!-- Sidebar -->
                <aside class="sidebar">
                    <!-- Info Section -->
                    <div class="sidebar-section sidebar-page-info">
                        <h3 data-i18n="album.section_info">Info</h3>
                        <div class="info-box">
                            <p><strong data-i18n="album.info_mode">Modo:</strong> <span id="album-layout-mode">-</span></p>
                            <p><strong data-i18n="album.info_photos">Fotos:</strong> <span id="photo-count">0</span></p>
                        </div>
                    </div>

                    <!-- Page Title Section -->
                    <div class="sidebar-section sidebar-page-info">
                        <h3 data-i18n="album.page_title">Título de Página</h3>
                        <input 
                            type="text" 
                            id="page-title" 
                            class="form-input" 
                            data-i18n-placeholder="album.page_title_placeholder"
                            placeholder="Título de la página"
                        />
                        <button id="update-title-btn" class="btn btn-secondary btn-block" data-i18n="album.update_title">
                            ✏️ Actualizar Título
                        </button>
                    </div>

                    <!-- Layout Mode Section -->
                    <div class="sidebar-section sidebar-page-info">
                        <h3 data-i18n="album.layout_mode">Modo de Layout</h3>
                        <select id="layout-mode-select" class="form-input">
                            <option value="mesa_de_luz" data-i18n="album.layout_mesa">Mesa de Luz</option>
                            <option value="grid_compacto" data-i18n="album.layout_grid">Grid Compacto</option>
                            <option value="hibrido" data-i18n="album.layout_hibrido">Híbrido</option>
                        </select>
                        <button id="apply-layout-mode-btn" class="btn btn-secondary btn-block" data-i18n="album.apply_layout">
                            ⚙️ Aplicar Modo
                        </button>
                    </div>

                    <!-- Photo Caption Section -->
                    <div class="sidebar-section sidebar-page-info">
                        <h3 data-i18n="album.photo_caption">Subtítulo de Foto</h3>
                        <textarea 
                            id="photo-caption" 
                            class="form-textarea" 
                            data-i18n-placeholder="album.photo_caption_placeholder"
                            placeholder="Escribe un subtítulo para la foto seleccionada"
                            rows="3"
                            disabled
                        ></textarea>
                        <button id="update-caption-btn" class="btn btn-secondary btn-block" disabled data-i18n="album.update_caption">
                            ✏️ Actualizar Subtítulo
                        </button>
                    </div>

                    <!-- Actions Section -->
                    <div class="sidebar-section sidebar-page-info">
                        <h3 data-i18n="album.section_actions">Acciones</h3>
                        <button id="regenerate-btn" class="btn btn-primary btn-block" data-i18n="album.regenerate_preview">
                            🔄 Regenerar Vista Previa
                        </button>
                        <button id="add-page-btn" class="btn btn-secondary btn-block" data-i18n="album.add_page">
                            + Añadir Página Después
                        </button>
                        <button id="delete-page-btn" class="btn btn-danger btn-block" data-i18n="album.delete_page">
                            🗑️ Borrar Página Completa
                        </button>
                    </div>

                    <!-- Photos Section -->
                    <div class="sidebar-section sidebar-photos">
                        <h3 data-i18n="album.section_photos">Fotos</h3>
                        <div id="photo-list" class="photo-list">
                            <!-- Photos will be loaded here via JavaScript -->
                        </div>
                    </div>

                    <!-- Delete Photo Button -->
                    <div class="sidebar-section sidebar-photos" style="border-top: 1px solid var(--color-border); padding: 12px; flex-grow: 0;">
                        <button id="delete-photo-btn" class="btn btn-danger btn-block" disabled data-i18n="album.delete_photo">
                            🗑️ Borrar Foto Seleccionada
                        </button>
                    </div>
                </aside>

                <!-- Preview Area -->
                <main class="preview-area">
                    <div class="preview-container">
                        <iframe 
                            id="pdf-preview" 
                            class="pdf-iframe"
                            data-i18n-title="image.page_preview"
                            title="Vista previa de página"
                        ></iframe>
                    </div>
                    <div id="loading-overlay" class="loading-overlay" style="display: none;">
                        <div class="loading-spinner"></div>
                        <p data-i18n="loading.preview">Generando vista previa...</p>
                    </div>
                </main>
            </div>

        </div>
    </div>

    <!-- Hidden data from server -->
    <script>
        const PAGES_DATA = {{ pages|tojson }};
        const ALBUM_TITLE = "{{ album_title }}";
        const TOTAL_PAGES = {{ total_pages }};
    </script>

    <!-- Internationalization (must load first) -->
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    
    <!-- Common utilities -->
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    
    <!-- Album mode scripts -->
    <script src="{{ url_for('static', filename='js/album.js') }}"></script>
    
    <!-- Source mode scripts -->
    <script src="{{ url_for('static', filename='js/source.js') }}"></script>
    
    <!-- App controller -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
