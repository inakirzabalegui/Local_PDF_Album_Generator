<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Álbum — {{ album_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/editor.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        .header-center h1 .ornament {
            color: var(--vermilion);
            font-family: var(--font-serif);
            font-style: italic;
            font-variation-settings: "opsz" 36, "SOFT" 80, "wght" 360;
            margin-right: 6px;
        }
        .page-indicator .slash {
            color: var(--vermilion);
            padding: 0 4px;
            font-family: var(--font-serif);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button id="prev-btn" class="btn btn-nav">← Anterior</button>
            </div>
            <div class="header-center">
                <h1><span class="ornament">·</span>{{ album_title }}</h1>
                <span class="page-indicator">Página&nbsp;<span id="current-page-num">1</span><span class="slash">&nbsp;/&nbsp;</span><span id="total-pages">{{ total_pages }}</span></span>
            </div>
            <div class="header-right">
                <button id="next-btn" class="btn btn-nav">Siguiente →</button>
                <label class="theme-switch" title="Modo oscuro">
                    <input type="checkbox" id="theme-toggle">
                    <span class="theme-slider"></span>
                </label>
                <button id="debug-btn" class="btn btn-secondary" title="Ver log de depuración">{ }</button>
                <button id="undo-btn" class="btn btn-secondary" disabled>↶ Deshacer</button>
                <button id="save-btn" class="btn btn-primary">💾 Guardar</button>
                <button id="exit-btn" class="btn btn-secondary">✕ Salir</button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Page Navigator Panel (collapsible, left edge) -->
            <div id="page-panel" class="page-panel collapsed">
                <div class="page-panel-topbar">
                    <button id="page-panel-toggle" class="page-panel-toggle-btn" title="Navegador de páginas">
                        <span class="hamburger-icon">
                            <span></span>
                            <span></span>
                            <span></span>
                        </span>
                    </button>
                    <span class="page-panel-label">Páginas</span>
                </div>
                <div class="page-panel-inner">
                    <div id="page-list" class="page-list"></div>
                </div>
            </div>

            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>Fotos</h3>
                    <div id="photo-list" class="photo-list">
                        <!-- Photos will be loaded here via JavaScript -->
                    </div>
                </div>

                <div class="sidebar-section">
                    <button id="delete-photo-btn" class="btn btn-danger btn-block" disabled>
                        🗑️ Borrar Foto Seleccionada
                    </button>
                </div>

                <div class="sidebar-section">
                    <h3>Título de Página</h3>
                    <input 
                        type="text" 
                        id="page-title" 
                        class="form-input" 
                        placeholder="Título de la página"
                    />
                    <button id="update-title-btn" class="btn btn-secondary btn-block">
                        ✏️ Actualizar Título
                    </button>
                </div>

                <div class="sidebar-section">
                    <h3>Subtítulo de Foto</h3>
                    <textarea 
                        id="photo-caption" 
                        class="form-textarea" 
                        placeholder="Escribe un subtítulo para la foto seleccionada"
                        rows="3"
                        disabled
                    ></textarea>
                    <button id="update-caption-btn" class="btn btn-secondary btn-block" disabled>
                        ✏️ Actualizar Subtítulo
                    </button>
                </div>

                <div class="sidebar-section">
                    <h3>Acciones</h3>
                    <button id="regenerate-btn" class="btn btn-primary btn-block">
                        🔄 Regenerar Vista Previa
                    </button>
                    <button id="explode-page-btn" class="btn btn-secondary btn-block">
                        💥 Explotar Página en Dos
                    </button>
                    <button id="delete-page-btn" class="btn btn-danger btn-block">
                        🗑️ Borrar Página Completa
                    </button>
                </div>

                <div class="sidebar-section">
                    <h3>Info</h3>
                    <div class="info-box">
                        <p><strong>Modo:</strong> <span id="layout-mode">-</span></p>
                        <p><strong>Fotos:</strong> <span id="photo-count">0</span></p>
                    </div>
                </div>
            </aside>

            <!-- Preview Area -->
            <main class="preview-area">
                <div class="preview-container">
                    <iframe 
                        id="pdf-preview" 
                        class="pdf-iframe"
                        title="Vista previa de página"
                    ></iframe>
                </div>
                <div id="loading-overlay" class="loading-overlay" style="display: none;">
                    <div class="loading-spinner"></div>
                    <p>Generando vista previa...</p>
                </div>
            </main>
        </div>
    </div>

    <!-- Hidden data from server -->
    <script>
        const PAGES_DATA = {{ pages|tojson }};
        const ALBUM_TITLE = "{{ album_title }}";
        const TOTAL_PAGES = {{ total_pages }};
    </script>

    <script src="{{ url_for('static', filename='js/editor.js') }}"></script>
</body>
</html>
